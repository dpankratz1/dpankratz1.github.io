<!doctype html>
<html lang="en">

  <body>
    <div class="main">

        <img src="self.jpg" alt="Dieter Pankratz" />

          <div><strong>Name:</strong> <label>Dieter Pankratz</label></div>

          <div>
            <strong>Occupation:</strong> <label>Software Engineer</label>
          </div>
          <div>
            <strong>Links:</strong>
            <label>

          <div class="row">

          <div class="row">
            <label class="green">Projects</label>
            <span
              ><a href="#">Project One</a>, <a href="#">Project Two</a></span
            >

          <div class="row">
            <label>Open-source</label>
            <span
              ><a href="https://github.com/dpankratz1">Github projects</a></span
            >
          </div>

        <div class="logbook">
          <h3><span>Logbook</span></h3>
          <div class="entries">
            <div class="entry">
              <span>05.07.2026</span>
              <div>Started this website.</div>
            </div>
          </div>
        </div>

        <div class="blog">
          <h3><span>Blog</span></h3>
          <div class="posts">
            <ul>
              <li>
                <span class="date">05.07.2026</span>
                <a href="#">My First Post</a>
              </li>
            </ul>
          </div>
        </div>
      </div>

</html>
