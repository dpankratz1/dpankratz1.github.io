<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dieter Pankratz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Open+Sans:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      class="theme-toggle"
      type="button"
      aria-label="Toggle color theme"
      title="Toggle color theme"
    >
      <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            d="M20 14.2A8.2 8.2 0 0 1 9.8 4 9 9 0 1 0 20 14.2Z"
            fill="currentColor"
          ></path>
        </svg>
      </span>
      <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <circle cx="12" cy="12" r="4.5" fill="currentColor"></circle>
          <path
            d="M12 1.5v3M12 19.5v3M1.5 12h3M19.5 12h3M4.6 4.6l2.1 2.1M17.3 17.3l2.1 2.1M19.4 4.6l-2.1 2.1M6.7 17.3l-2.1 2.1"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="1.8"
          ></path>
        </svg>
      </span>
    </button>

    <div class="main">
      <div class="profile-pic">
        <div class="avatar-smiley" aria-label="Random smiley avatar" role="img">
          :)
        </div>
      </div>

      <div class="main-content">
        <div class="info-table">
          <div class="info-column">
            <div class="info-item">
              <strong>Name:</strong> <span class="info-value">Dieter Pankratz</span>
            </div>
            <div class="info-item">
              <strong>Occupation:</strong> <span class="info-value">Software Engineer</span>
            </div>
          </div>
          <div class="info-column">
            <div class="info-item">
              <strong>Location:</strong> <span class="info-value">Berlin</span>
            </div>
            <div class="info-item">
              <strong>Links:</strong>
              <span class="info-value">
                <a href="mailto:pankratzdieter@googlemail.com">Email</a>
                <i>|</i>
                <a href="https://github.com/dpankratz1">Github</a>
              </span>
            </div>
          </div>
        </div>

        <div class="work-table">
          <h3><span>Work</span></h3>

          <div class="row">
            <label class="green">Current</label>
            <span
              ><a href="https://wolt.com">Wolt</a> <i>|</i>
              <a href="https://www.doordash.com">DoorDash</a></span
            >
          </div>

          <div class="row">
            <label class="red">Past</label>
            <span
              ><a href="https://n26.com">N26</a>,
              <a href="https://www.mcmakler.de">McMakler</a></span
            >
          </div>

          <div class="divider"></div>

          <div class="row">
            <label class="green">Projects</label>
            <span
              ><a href="#">Project One</a>, <a href="#">Project Two</a></span
            >
          </div>

          <div class="row">
            <label>Open-source</label>
            <span
              ><a href="https://github.com/dpankratz1">Github projects</a></span
            >
          </div>
        </div>

        <div class="logbook">
          <h3><span>Logbook</span></h3>
          <div class="entries">
            <div class="entry">
              <span>05.07.2026</span> Started this website.
            </div>
          </div>
        </div>

        <div class="blog">
          <h3><span>Blog</span></h3>
          <div class="posts">
            <ul>
              <li>
                <span class="date">05.07.2026</span>
                <a href="#">My First Post</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <script>
      const smileys = [":)", ":D", ":]", "=)", "^_^", ":-)", "xD", ":3"];
      const avatar = document.querySelector(".avatar-smiley");
      const themeToggle = document.querySelector(".theme-toggle");
      const root = document.documentElement;

      const getPreferredTheme = () => {
        const savedTheme = localStorage.getItem("theme");

        if (savedTheme === "light" || savedTheme === "dark") {
          return savedTheme;
        }

        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
      };

      const applyTheme = (theme) => {
        root.setAttribute("data-theme", theme);
      };

      if (avatar) {
        avatar.textContent = smileys[Math.floor(Math.random() * smileys.length)];
      }

      applyTheme(getPreferredTheme());

      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const nextTheme =
            root.getAttribute("data-theme") === "dark" ? "light" : "dark";

          localStorage.setItem("theme", nextTheme);
          applyTheme(nextTheme);
        });
      }
    </script>
  </body>
</html>
